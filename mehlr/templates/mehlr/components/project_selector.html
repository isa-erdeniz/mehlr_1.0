<div class="flex gap-2 items-center flex-wrap mb-2">
  <label class="text-sm font-medium text-gray-600">Proje:</label>
  <select name="project_slug" id="mehlr-project-select" class="rounded-lg border border-gray-300 px-3 py-1.5 text-sm focus:ring-2 focus:ring-mehlr-accent focus:border-mehlr-accent">
    <option value="">Genel</option>
    {% for project in projects %}
      <option value="{{ project.slug }}" {% if conversation and conversation.project_id == project.id %}selected{% endif %}>{{ project.name }}</option>
    {% endfor %}
  </select>
</div>
